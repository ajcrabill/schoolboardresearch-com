---
layout: default
---
<header class="article-header">
  <div class="article-header-inner">
    <span class="study-badge">{{ page.study_type }}</span>
    <h1>{{ page.title }}</h1>
    <div class="article-meta">
      <span>{{ page.date_display }}</span>
      <span>School Board Research</span>
    </div>
    {% if page.citation %}
    <div class="article-citation">
      {% if page.doi %}<a href="https://doi.org/{{ page.doi }}" target="_blank" rel="noopener">DOI: {{ page.doi }}</a> — {% endif %}{{ page.citation }}
    </div>
    {% endif %}
  </div>
</header>
<div class="back-bar">
  <a href="/" class="back-link">← Back to School Board Research</a>
</div>
{{ content }}
