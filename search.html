---
layout: page
title: "Search"
---
<section class="hero">
    <h1>Search Research</h1>
    <p>Browse and search all reviewed studies</p>
  </section>

  <section class="search-section">
    <div class="search-wrapper">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="search"
        id="search-input"
        placeholder="Search research titles, findings, topics..."
        aria-label="Search research"
        autocomplete="off"
      >
    </div>
  </section>

  <section class="filter-section" aria-label="Filter by topic">
    <div class="filter-inner">
      <span class="filter-label">Filter:</span>
      <button class="topic-btn active" data-topic="all">All</button>
      <button class="topic-btn" data-topic="accountability">Accountability</button>
      <button class="topic-btn" data-topic="outcomes">Outcomes</button>
      <button class="topic-btn" data-topic="superintendent">Superintendent</button>
      <button class="topic-btn" data-topic="composition">Board Composition</button>
      <button class="topic-btn" data-topic="policy">Policy &amp; Oversight</button>
    </div>
  </section>

  <section class="results-section">
    <p class="results-meta" id="results-meta" aria-live="polite">
      Showing <strong id="count-shown">6</strong> of <strong id="count-total">6</strong> studies
    </p>
    <div class="results-grid" id="results-grid" aria-live="polite">
      <!-- Cards rendered by JS -->
    </div>
  </section>

  <script>
    const articles = [
      {
        title: "High Turnover With Low Accountability: Local School Board Elections in 16 States",
        url: "/research/board-elections-accountability-turnover.html",
        badge: "Large-N Empirical Analysis",
        finding: "More than half of board seats change hands each election cycle — but almost entirely through voluntary retirement, not electoral defeat. Incumbents who run win over 80% of the time, and board turnover is only weakly related to student learning rates.",
        citation: "Kogan, Lavertu & Peskowitz (2025). AERA Open. Spencer Foundation.",
        topics: ["accountability"],
        pearls: 26
      },
      {
        title: "What Does \"Effective Board Governance\" Actually Predict? A Review of the Literature",
        url: "/research/effective-governance-literature.html",
        badge: "Literature Review",
        finding: "Research traditions differ in how they define effective governance, but converge on outcome monitoring as the governance practice most consistently associated with improved student results.",
        citation: "Synthesis of peer-reviewed studies and RAND policy reports",
        topics: ["outcomes", "accountability"],
        pearls: null
      },
      {
        title: "Training Without Accountability Doesn't Move Outcomes",
        url: "/research/training-without-accountability.html",
        badge: "Meta-Analysis",
        finding: "Multiple studies find that knowledge-based board training, absent accompanying accountability structures, produces measurable knowledge gains but not behavioral change or improved student outcomes.",
        citation: "Synthesized from 6 peer-reviewed studies, 2019–2024",
        topics: ["accountability"],
        pearls: null
      },
      {
        title: "Board Governance and Student Achievement: Tracing the Causal Chain",
        url: "/research/board-governance-student-achievement.html",
        badge: "Cross-District Longitudinal",
        finding: "The path from board governance to student outcomes is long and mediated, but boards that focus on setting clear expectations and monitoring outcomes show the strongest downstream association with student performance.",
        citation: "Waters & Marzano (2009), McREL International. Meta-analysis, n=2,817 studies.",
        topics: ["outcomes"],
        pearls: 25
      },
      {
        title: "Does Who Sits on the Board Matter? Board Composition and Equity Outcomes",
        url: "/research/board-composition-equity.html",
        badge: "Comparative Policy Study",
        finding: "Demographically representative boards show modest but consistent associations with equity-related policy adoption. The direct effect on student outcomes is weaker and more mediated.",
        citation: "Meier & England (1984); Berkman & Plutzer (2005). Academic political science research.",
        topics: ["composition"],
        pearls: 22
      },
      {
        title: "The Quality of Superintendent Evaluation Predicts More Than Its Frequency",
        url: "/research/superintendent-evaluation-quality.html",
        badge: "Survey Study",
        finding: "The rigor and specificity of superintendent evaluations correlates more strongly with district performance trajectories than evaluation frequency or formal policy compliance.",
        citation: "AASA / NSBA survey research, n=890 superintendents",
        topics: ["superintendent", "accountability"],
        pearls: 21
      },
      {
        title: "When States Step In: What Research Shows About Oversight Regimes and Local Board Performance",
        url: "/research/state-oversight-local-autonomy.html",
        badge: "Policy Analysis",
        finding: "State intervention reduces the worst outcomes in lowest-performing districts but does not on average improve governance quality for boards not near the intervention threshold.",
        citation: "RAND Corporation; Hess & Meeks (2010), Fordham Institute.",
        topics: ["policy"],
        pearls: 22
      }
    ];

    const totalCount = articles.length;
    let activeTopic = "all";

    const searchInput = document.getElementById("search-input");
    const resultsGrid = document.getElementById("results-grid");
    const countShown = document.getElementById("count-shown");
    const countTotal = document.getElementById("count-total");
    const topicBtns = document.querySelectorAll(".topic-btn");

    countTotal.textContent = totalCount;

    function buildCard(article) {
      const card = document.createElement("article");
      card.className = "card";

      const badge = document.createElement("span");
      badge.className = "card-badge";
      badge.textContent = article.badge;

      const titleEl = document.createElement("h2");
      titleEl.className = "card-title";
      const titleLink = document.createElement("a");
      titleLink.href = article.url;
      titleLink.textContent = article.title;
      titleEl.appendChild(titleLink);

      const finding = document.createElement("p");
      finding.className = "card-finding";
      finding.textContent = article.finding;

      const footer = document.createElement("div");
      footer.className = "card-footer";

      const citation = document.createElement("span");
      citation.className = "card-citation";
      citation.textContent = article.citation;
      footer.appendChild(citation);

      if (article.pearls !== null) {
        const pearls = document.createElement("span");
        pearls.className = "card-pearls";
        pearls.textContent = "PEARLS: " + article.pearls + "/30";
        footer.appendChild(pearls);
      }

      card.appendChild(badge);
      card.appendChild(titleEl);
      card.appendChild(finding);
      card.appendChild(footer);

      return card;
    }

    function renderResults() {
      const query = searchInput.value.trim().toLowerCase();

      const filtered = articles.filter(function(a) {
        const topicMatch = activeTopic === "all" || a.topics.includes(activeTopic);
        const textMatch = !query ||
          a.title.toLowerCase().includes(query) ||
          a.finding.toLowerCase().includes(query) ||
          a.citation.toLowerCase().includes(query);
        return topicMatch && textMatch;
      });

      resultsGrid.innerHTML = "";
      countShown.textContent = filtered.length;

      if (filtered.length === 0) {
        const noResults = document.createElement("div");
        noResults.className = "no-results";

        noResults.innerHTML = `
          <svg class="no-results-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
          <h3>No matching research found</h3>
          <p>Try different search terms or clear the topic filter.</p>
        `;

        resultsGrid.appendChild(noResults);
      } else {
        filtered.forEach(function(a) {
          resultsGrid.appendChild(buildCard(a));
        });
      }
    }

    searchInput.addEventListener("input", renderResults);

    topicBtns.forEach(function(btn) {
      btn.addEventListener("click", function() {
        topicBtns.forEach(function(b) { b.classList.remove("active"); });
        btn.classList.add("active");
        activeTopic = btn.dataset.topic;
        renderResults();
      });
    });

    // Initial render
    renderResults();
  </script>
