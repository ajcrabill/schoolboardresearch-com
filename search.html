<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Research — School Board Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2C5F2D;
      --primary-dk: #1A3A1A;
      --accent: #97BC62;
      --accent-lt: #C8DFA3;
      --bg: #F8F6F2;
      --bg-cream: #F0EDE4;
      --bg-hero: #EDF5EE;
      --white: #FFFFFF;
      --text: #1A1A1A;
      --text-muted: #555;
      --text-light: #888;
      --border: #DDD9D0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Source Sans Pro', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* NAV */
    nav {
      background: var(--primary-dk);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .nav-logo {
      font-family: 'Merriweather', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .nav-logo span {
      color: var(--accent);
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 0.25rem;
    }

    .nav-links a {
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      padding: 0.4rem 0.85rem;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
      background: rgba(255,255,255,0.1);
    }

    .nav-links a.active {
      color: var(--accent);
      background: rgba(151,188,98,0.15);
    }

    /* HERO */
    .hero {
      background: var(--bg-hero);
      border-bottom: 1px solid var(--border);
      padding: 3.5rem 1.5rem 2.5rem;
      text-align: center;
    }

    .hero h1 {
      font-family: 'Merriweather', serif;
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--primary-dk);
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .hero p {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 520px;
      margin: 0 auto;
    }

    /* SEARCH BAR */
    .search-section {
      background: var(--bg-hero);
      padding: 0 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .search-wrapper {
      max-width: 720px;
      margin: 0 auto;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--text-light);
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      padding: 1rem 1.25rem 1rem 3rem;
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 1.05rem;
      color: var(--text);
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(44,95,45,0.12);
    }

    #search-input::placeholder {
      color: var(--text-light);
    }

    /* FILTER BAR */
    .filter-section {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
    }

    .filter-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .filter-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-right: 0.25rem;
      white-space: nowrap;
    }

    .topic-btn {
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .topic-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--bg-hero);
    }

    .topic-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--white);
    }

    /* RESULTS AREA */
    .results-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .results-meta {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .results-meta strong {
      color: var(--text);
    }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    /* CARDS */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      transition: box-shadow 0.2s, transform 0.15s;
    }

    .card:hover {
      box-shadow: 0 6px 20px rgba(44,95,45,0.1);
      transform: translateY(-2px);
    }

    .card-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--accent-lt);
      color: var(--primary-dk);
      padding: 0.25rem 0.65rem;
      border-radius: 20px;
      width: fit-content;
    }

    .card-title {
      font-family: 'Merriweather', serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .card-title a {
      color: var(--primary-dk);
      text-decoration: none;
      transition: color 0.2s;
    }

    .card-title a:hover {
      color: var(--primary);
      text-decoration: underline;
    }

    .card-finding {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.55;
      flex-grow: 1;
    }

    .card-footer {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    .card-citation {
      font-size: 0.78rem;
      color: var(--text-light);
      font-style: italic;
      line-height: 1.4;
      flex: 1;
    }

    .card-pearls {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--primary);
      background: var(--bg-hero);
      border: 1px solid var(--accent-lt);
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* NO RESULTS */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3.5rem 1.5rem;
    }

    .no-results-icon {
      width: 52px;
      height: 52px;
      color: var(--accent-lt);
      margin: 0 auto 1rem;
    }

    .no-results h3 {
      font-family: 'Merriweather', serif;
      font-size: 1.15rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .no-results p {
      font-size: 0.95rem;
      color: var(--text-light);
    }

    /* FOOTER */
    footer {
      background: var(--primary-dk);
      color: rgba(255,255,255,0.7);
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .footer-brand {
      font-family: 'Merriweather', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
    }

    .footer-brand span {
      color: var(--accent);
    }

    .footer-copy {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
    }

    /* RESPONSIVE */
    @media (max-width: 700px) {
      .hero h1 {
        font-size: 1.65rem;
      }

      .results-grid {
        grid-template-columns: 1fr;
      }

      .nav-links {
        gap: 0;
      }

      .nav-links a {
        padding: 0.4rem 0.5rem;
        font-size: 0.82rem;
      }

      .nav-logo {
        font-size: 0.95rem;
      }

      .filter-label {
        display: none;
      }
    }
  </style>
</head>
<body>

  <nav aria-label="Main navigation">
    <div class="nav-inner">
      <a href="/" class="nav-logo">School Board <span>Research</span></a>
      <ul class="nav-links">
        <li><a href="/#research">Research</a></li>
        <li><a href="/methodology.html">Methodology</a></li>
        <li><a href="/search.html" class="active">Search</a></li>
        <li><a href="/about.html">About</a></li>
      </ul>
    </div>
  </nav>

  <section class="hero">
    <h1>Search Research</h1>
    <p>Browse and search all reviewed studies</p>
  </section>

  <section class="search-section">
    <div class="search-wrapper">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="search"
        id="search-input"
        placeholder="Search research titles, findings, topics..."
        aria-label="Search research"
        autocomplete="off"
      >
    </div>
  </section>

  <section class="filter-section" aria-label="Filter by topic">
    <div class="filter-inner">
      <span class="filter-label">Filter:</span>
      <button class="topic-btn active" data-topic="all">All</button>
      <button class="topic-btn" data-topic="accountability">Accountability</button>
      <button class="topic-btn" data-topic="outcomes">Outcomes</button>
      <button class="topic-btn" data-topic="superintendent">Superintendent</button>
      <button class="topic-btn" data-topic="composition">Board Composition</button>
      <button class="topic-btn" data-topic="policy">Policy &amp; Oversight</button>
    </div>
  </section>

  <section class="results-section">
    <p class="results-meta" id="results-meta" aria-live="polite">
      Showing <strong id="count-shown">6</strong> of <strong id="count-total">6</strong> studies
    </p>
    <div class="results-grid" id="results-grid" aria-live="polite">
      <!-- Cards rendered by JS -->
    </div>
  </section>

  <footer>
    <div class="footer-inner">
      <div class="footer-brand">School Board <span>Research</span></div>
      <div class="footer-copy">&copy; 2025 School Board Research. All rights reserved.</div>
    </div>
  </footer>

  <script>
    const articles = [
      {
        title: "What Does \"Effective Board Governance\" Actually Predict? A Review of the Literature",
        url: "/research/effective-governance-literature.html",
        badge: "Literature Review",
        finding: "Research traditions differ in how they define effective governance, but converge on outcome monitoring as the governance practice most consistently associated with improved student results.",
        citation: "Synthesis of peer-reviewed studies and RAND policy reports",
        topics: ["outcomes", "accountability"],
        pearls: null
      },
      {
        title: "Training Without Accountability Doesn't Move Outcomes",
        url: "/research/training-without-accountability.html",
        badge: "Meta-Analysis",
        finding: "Multiple studies find that knowledge-based board training, absent accompanying accountability structures, produces measurable knowledge gains but not behavioral change or improved student outcomes.",
        citation: "Synthesized from 6 peer-reviewed studies, 2019–2024",
        topics: ["accountability"],
        pearls: null
      },
      {
        title: "Board Governance and Student Achievement: Tracing the Causal Chain",
        url: "/research/board-governance-student-achievement.html",
        badge: "Cross-District Longitudinal",
        finding: "The path from board governance to student outcomes is long and mediated, but boards that focus on setting clear expectations and monitoring outcomes show the strongest downstream association with student performance.",
        citation: "Waters & Marzano (2009), McREL International. Meta-analysis, n=2,817 studies.",
        topics: ["outcomes"],
        pearls: 25
      },
      {
        title: "Does Who Sits on the Board Matter? Board Composition and Equity Outcomes",
        url: "/research/board-composition-equity.html",
        badge: "Comparative Policy Study",
        finding: "Demographically representative boards show modest but consistent associations with equity-related policy adoption. The direct effect on student outcomes is weaker and more mediated.",
        citation: "Meier & England (1984); Berkman & Plutzer (2005). Academic political science research.",
        topics: ["composition"],
        pearls: 22
      },
      {
        title: "The Quality of Superintendent Evaluation Predicts More Than Its Frequency",
        url: "/research/superintendent-evaluation-quality.html",
        badge: "Survey Study",
        finding: "The rigor and specificity of superintendent evaluations correlates more strongly with district performance trajectories than evaluation frequency or formal policy compliance.",
        citation: "AASA / NSBA survey research, n=890 superintendents",
        topics: ["superintendent", "accountability"],
        pearls: 21
      },
      {
        title: "When States Step In: What Research Shows About Oversight Regimes and Local Board Performance",
        url: "/research/state-oversight-local-autonomy.html",
        badge: "Policy Analysis",
        finding: "State intervention reduces the worst outcomes in lowest-performing districts but does not on average improve governance quality for boards not near the intervention threshold.",
        citation: "RAND Corporation; Hess & Meeks (2010), Fordham Institute.",
        topics: ["policy"],
        pearls: 22
      }
    ];

    const totalCount = articles.length;
    let activeTopic = "all";

    const searchInput = document.getElementById("search-input");
    const resultsGrid = document.getElementById("results-grid");
    const countShown = document.getElementById("count-shown");
    const countTotal = document.getElementById("count-total");
    const topicBtns = document.querySelectorAll(".topic-btn");

    countTotal.textContent = totalCount;

    function buildCard(article) {
      const card = document.createElement("article");
      card.className = "card";

      const badge = document.createElement("span");
      badge.className = "card-badge";
      badge.textContent = article.badge;

      const titleEl = document.createElement("h2");
      titleEl.className = "card-title";
      const titleLink = document.createElement("a");
      titleLink.href = article.url;
      titleLink.textContent = article.title;
      titleEl.appendChild(titleLink);

      const finding = document.createElement("p");
      finding.className = "card-finding";
      finding.textContent = article.finding;

      const footer = document.createElement("div");
      footer.className = "card-footer";

      const citation = document.createElement("span");
      citation.className = "card-citation";
      citation.textContent = article.citation;
      footer.appendChild(citation);

      if (article.pearls !== null) {
        const pearls = document.createElement("span");
        pearls.className = "card-pearls";
        pearls.textContent = "PEARLS: " + article.pearls + "/30";
        footer.appendChild(pearls);
      }

      card.appendChild(badge);
      card.appendChild(titleEl);
      card.appendChild(finding);
      card.appendChild(footer);

      return card;
    }

    function renderResults() {
      const query = searchInput.value.trim().toLowerCase();

      const filtered = articles.filter(function(a) {
        const topicMatch = activeTopic === "all" || a.topics.includes(activeTopic);
        const textMatch = !query ||
          a.title.toLowerCase().includes(query) ||
          a.finding.toLowerCase().includes(query) ||
          a.citation.toLowerCase().includes(query);
        return topicMatch && textMatch;
      });

      resultsGrid.innerHTML = "";
      countShown.textContent = filtered.length;

      if (filtered.length === 0) {
        const noResults = document.createElement("div");
        noResults.className = "no-results";

        noResults.innerHTML = `
          <svg class="no-results-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
          <h3>No matching research found</h3>
          <p>Try different search terms or clear the topic filter.</p>
        `;

        resultsGrid.appendChild(noResults);
      } else {
        filtered.forEach(function(a) {
          resultsGrid.appendChild(buildCard(a));
        });
      }
    }

    searchInput.addEventListener("input", renderResults);

    topicBtns.forEach(function(btn) {
      btn.addEventListener("click", function() {
        topicBtns.forEach(function(b) { b.classList.remove("active"); });
        btn.classList.add("active");
        activeTopic = btn.dataset.topic;
        renderResults();
      });
    });

    // Initial render
    renderResults();
  </script>

</body>
</html>
